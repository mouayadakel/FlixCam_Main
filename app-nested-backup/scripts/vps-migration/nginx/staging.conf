# FlixCam staging — Nginx reverse proxy (port 3001)
# Copy to /etc/nginx/conf.d/flixcam-staging.conf.
# Use a subdomain, e.g. staging.flixcam.rent, and get SSL for it.

upstream flixcam_staging {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    server_name staging.flixcam.rent;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.flixcam.rent;

    ssl_certificate     /etc/letsencrypt/live/staging.flixcam.rent/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.flixcam.rent/privkey.pem;

    location / {
        proxy_pass http://flixcam_staging;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /home/flixcam/logs/staging/access.log;
    error_log  /home/flixcam/logs/staging/error.log;
}

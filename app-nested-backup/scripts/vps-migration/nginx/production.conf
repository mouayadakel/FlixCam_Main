# FlixCam production — Nginx reverse proxy (port 3000)
# Copy to /etc/nginx/conf.d/flixcam-production.conf and reload nginx.
# SSL: use certbot or place certs under /home/flixcam/shared/ssl/.

upstream flixcam_production {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name flixcam.rent www.flixcam.rent;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flixcam.rent www.flixcam.rent;

    ssl_certificate     /etc/letsencrypt/live/flixcam.rent/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flixcam.rent/privkey.pem;

    location / {
        proxy_pass http://flixcam_production;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /home/flixcam/logs/production/access.log;
    error_log  /home/flixcam/logs/production/error.log;
}

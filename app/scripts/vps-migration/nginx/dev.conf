# FlixCam dev — Nginx reverse proxy (port 3002)
# Copy to /etc/nginx/conf.d/flixcam-dev.conf.
# Optional: restrict by IP or use a separate dev.flixcam.rent with SSL.

upstream flixcam_dev {
    server 127.0.0.1:3002;
    keepalive 64;
}

server {
    listen 80;
    server_name dev.flixcam.rent;

    location / {
        proxy_pass http://flixcam_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /home/flixcam/logs/dev/access.log;
    error_log  /home/flixcam/logs/dev/error.log;
}

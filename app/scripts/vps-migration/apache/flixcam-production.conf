# FlixCam production — Apache reverse proxy to Node (port 3000)
# Copy to /etc/httpd/conf.d/flixcam-production.conf
# Ensure mod_proxy and mod_proxy_http are enabled. Then: sudo apachectl configtest && sudo systemctl reload httpd

<VirtualHost *:80>
    ServerName flixcam.rent
    ServerAlias www.flixcam.rent
    Redirect permanent / https://flixcam.rent/
</VirtualHost>

<VirtualHost *:443>
    ServerName flixcam.rent
    ServerAlias www.flixcam.rent

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/flixcam.rent/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/flixcam.rent/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog  /home/flixcam/logs/production/apache-error.log
    CustomLog /home/flixcam/logs/production/apache-access.log combined
</VirtualHost>

# Run tests with coverage (e.g. on schedule or manual)
# Use when you want coverage report without full CI

name: Test coverage

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'jest.config.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  test-coverage:
    name: Test with coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U ci 2>/dev/null; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Create root role
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          PGPASSWORD=ci psql -h localhost -p 5432 -U ci -d ci -f scripts/postgres-ci-init.sql

      - name: Prisma generate
        run: npm run db:generate
        env:
          DATABASE_URL: 'postgresql://root:root@localhost:5432/ci?schema=public'

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://root:root@localhost:5432/ci?schema=public'

      - name: Run tests with coverage
        run: npm run test:coverage -- --passWithNoTests
        env:
          DATABASE_URL: 'postgresql://root:root@localhost:5432/ci?schema=public'
          AUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'ci-encryption-key-32-chars-long!'

      - name: Upload coverage (optional)
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
